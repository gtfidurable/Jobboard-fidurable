<!DOCTYPE html>                                                                                                                                                     
  <html lang="fr">                                                                                                                                                    
  <head>                                                                                                                                                            
    <meta charset="UTF-8" />                                                                                                                                          
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />                                                                                          
    <title>Jobboard FiDurable</title>
    <style>
      :root {
        --green:      #1C443F;
        --green-dark: #0F3B36;
        --white:      #FFFFFF;
        --bg:         #F0F4F3;
        --text:       #0B1220;
        --muted:      rgba(11,18,32,.5);
        --border:     rgba(11,18,32,.08);
        --radius:     18px;
        --shadow:     0 4px 24px rgba(11,18,32,.07);
        --shadow-hover: 0 16px 48px rgba(11,18,32,.14);
        --transition: .25s ease;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Inter, system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 40px 28px 60px; -webkit-font-smoothing:
  antialiased; }

      /* ── Header ── */
      .fjb-header { margin-bottom: 28px; }
      .fjb-header h1 { font-size: 1.6rem; font-weight: 800; color: var(--green); margin-bottom: 4px; letter-spacing: -.02em; }
      .fjb-header p { font-size: .9rem; color: var(--muted); }

      /* ── Skeleton ── */
      .fjb-skeleton-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
      @media (max-width: 1100px) { .fjb-skeleton-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 620px)  { .fjb-skeleton-grid { grid-template-columns: 1fr; } }
      .fjb-skeleton-card { background: var(--white); border-radius: var(--radius); border: 1.5px solid var(--border); overflow: hidden; height: 160px; }
      .fjb-shimmer { width: 100%; height: 100%; background: linear-gradient(90deg, #e8eeec 25%, #f4f7f6 50%, #e8eeec 75%); background-size: 200% 100%; animation:
  shimmer 1.4s infinite; }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

      /* ── Toolbar sticky ── */
      #fjb-toolbar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(240,244,243,.92);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 12px 0;
        margin: 0 -28px 24px;
        padding-left: 28px;
        padding-right: 28px;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        border-bottom: 1px solid var(--border);
      }
      #fjb-search {
        border: 1.5px solid var(--border);
        border-radius: 999px;
        padding: 8px 18px;
        font-size: .83rem;
        font-family: inherit;
        font-weight: 500;
        color: var(--text);
        background: var(--white);
        transition: all var(--transition);
        width: 200px;
        outline: none;
      }
      #fjb-search::placeholder { color: var(--muted); }
      #fjb-search:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(28,68,63,.1); }
      #fjb-count { font-size: .85rem; font-weight: 700; color: var(--green); background: rgba(28,68,63,.08); padding: 8px 16px; border-radius: 999px; white-space:
  nowrap; }
      .fjb-filter { appearance: none; border: 1.5px solid var(--border); border-radius: 999px; padding: 8px 18px; font-size: .83rem; font-family: inherit;
  font-weight: 500; color: var(--text); background: var(--white); cursor: pointer; transition: all var(--transition); outline: none; }
      .fjb-filter:hover { border-color: var(--green); color: var(--green); }
      .fjb-filter.active { background: var(--green); border-color: var(--green); color: var(--white); }
      #fjb-reset { background: transparent; border: 1.5px solid var(--border); border-radius: 999px; padding: 8px 16px; font-size: .83rem; font-family: inherit;
  font-weight: 500; color: var(--muted); cursor: pointer; transition: all var(--transition); }
      #fjb-reset:hover { border-color: var(--green); color: var(--green); }

      /* ── Grid ── */
      #fjb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
      @media (max-width: 1100px) { #fjb-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 620px)  { #fjb-grid { grid-template-columns: 1fr; } }

      /* ── Card ── */
      .fjb-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); border: 1.5px solid var(--border); overflow: hidden; cursor:
  pointer; display: flex; flex-direction: column; opacity: 0; transform: translateY(20px); transition: transform .3s ease, box-shadow .3s ease, opacity .3s ease,
  border-color .3s ease; }
      .fjb-card.visible { opacity: 1; transform: translateY(0); }
      .fjb-card:hover { transform: translateY(-6px) scale(1.01); box-shadow: var(--shadow-hover); border-color: rgba(28,68,63,.2); }
      .fjb-card:focus { outline: 2px solid var(--green); outline-offset: 2px; }
      .fjb-card-top { padding: 20px 20px 16px; display: flex; align-items: flex-start; gap: 14px; position: relative; }
      .fjb-avatar { width: 44px; height: 44px; min-width: 44px; border-radius: 12px; background: var(--green); color: var(--white); font-weight: 800; font-size:
  .95rem; display: flex; align-items: center; justify-content: center; letter-spacing: -.02em; }
      .fjb-card-info { flex: 1; min-width: 0; padding-right: 8px; }
      .fjb-card-titre { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden; }
      .fjb-card-entreprise { font-size: .8rem; color: var(--muted); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .fjb-card-divider { height: 1px; background: var(--border); margin: 0 20px; }
      .fjb-card-footer { padding: 14px 20px 18px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
      .fjb-card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
      .fjb-card-date { font-size: .78rem; color: var(--muted); display: flex; align-items: center; gap: 5px; }
      .fjb-card-cta { margin-top: auto; display: flex; justify-content: flex-end; }
      .fjb-card-cta span { font-size: .8rem; font-weight: 700; color: var(--green); display: flex; align-items: center; gap: 4px; transition: gap var(--transition); }
      .fjb-card:hover .fjb-card-cta span { gap: 8px; }

      /* ── Badge "Nouveau" ── */
      .fjb-badge-new {
        position: absolute;
        top: 16px; right: 16px;
        background: #16a34a;
        color: white;
        font-size: .68rem;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 999px;
        letter-spacing: .04em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .fjb-badge-new::before {
        content: '';
        width: 6px; height: 6px;
        background: white;
        border-radius: 50%;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(.7); } }

      /* ── Badges ── */
      .fjb-badge { font-size: .72rem; font-weight: 600; padding: 3px 10px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
   transition: opacity var(--transition), transform var(--transition); }
      .fjb-badge:hover { opacity: .8; transform: scale(.97); }
      .fjb-badge--stage      { background: rgba(28,68,63,.1);   color: #1C443F; }
      .fjb-badge--cdi        { background: rgba(26,58,107,.1);  color: #1a3a6b; }
      .fjb-badge--alternance { background: rgba(180,83,9,.1);   color: #b45309; }
      .fjb-badge--phd        { background: rgba(107,33,168,.1); color: #6b21a8; }
      .fjb-badge--autre      { background: rgba(55,65,81,.1);   color: #374151; }
      .fjb-badge--secteur { background: rgba(28,68,63,.06); color: var(--green); border: 1px solid rgba(28,68,63,.15); }
      .fjb-badge--lieu    { background: #F3F4F6; color: #4B5563; }

      /* ── Empty state ── */
      .fjb-empty { grid-column: 1/-1; text-align: center; padding: 80px 0; }
      .fjb-empty p { color: var(--muted); margin-bottom: 16px; font-size: .95rem; }
      .fjb-empty button { background: var(--green); color: white; border: none; border-radius: 999px; padding: 10px 24px; font-size: .85rem; font-weight: 700;
  font-family: inherit; cursor: pointer; transition: background var(--transition); }
      .fjb-empty button:hover { background: var(--green-dark); }

      /* ── Backdrop ── */
      #fjb-backdrop { position: fixed; inset: 0; background: rgba(11,18,32,.4); backdrop-filter: blur(4px); z-index: 9998; opacity: 0; pointer-events: none;
  transition: opacity var(--transition); }
      #fjb-backdrop.is-open { opacity: 1; pointer-events: all; }

      /* ── Panel ── */
      #fjb-panel { position: fixed; top: 0; right: 0; height: 100vh; width: 500px; max-width: 100vw; background: var(--white); z-index: 9999; transform:
  translateX(100%); transition: transform .35s cubic-bezier(.4,0,.2,1); box-shadow: -12px 0 60px rgba(11,18,32,.15); overflow-y: auto; display: flex; flex-direction:
  column; }
      #fjb-panel.is-open { transform: translateX(0); }
      @media (max-width: 540px) { #fjb-panel { width: 100vw; } }
      #fjb-panel-close { position: sticky; top: 0; z-index: 1; align-self: flex-end; margin: 20px 20px 0 0; background: rgba(11,18,32,.06); border: none;
  border-radius: 50%; width: 36px; height: 36px; font-size: 1rem; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center;
  transition: background var(--transition), color var(--transition); }
      #fjb-panel-close:hover { background: rgba(11,18,32,.12); color: var(--text); }
      #fjb-panel-content { padding: 0 32px 56px; flex: 1; }
      .fjb-panel-header { background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%); margin: -56px -32px 0; padding: 32px 32px 28px; }
      .fjb-panel-avatar { width: 52px; height: 52px; border-radius: 14px; background: rgba(255,255,255,.18); color: var(--white); font-weight: 800; font-size: 1.1rem;
   display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
      .fjb-panel-titre { font-size: 1.3rem; font-weight: 800; color: var(--white); margin-bottom: 6px; line-height: 1.3; letter-spacing: -.02em; }
      .fjb-panel-entreprise { font-size: .9rem; color: rgba(255,255,255,.75); font-weight: 500; }
      .fjb-panel-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 28px; }
      .fjb-panel-meta { margin-top: 24px; background: #F8FAF9; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
      .fjb-panel-meta-item { display: flex; gap: 12px; font-size: .875rem; }
      .fjb-panel-meta-label { font-weight: 600; min-width: 110px; color: var(--muted); font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; }
      .fjb-panel-description { margin-top: 28px; border-top: 1px solid var(--border); padding-top: 24px; }
      .fjb-panel-description h4 { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
      .fjb-panel-description p { font-size: .9rem; line-height: 1.75; white-space: pre-wrap; color: var(--text); }
      .fjb-panel-cta { display: inline-flex; align-items: center; gap: 8px; margin-top: 32px; background: var(--green); color: var(--white); text-decoration: none;
  padding: 14px 28px; border-radius: 999px; font-weight: 700; font-size: .95rem; transition: background var(--transition), transform var(--transition), box-shadow
  var(--transition); box-shadow: 0 4px 16px rgba(28,68,63,.3); }
      .fjb-panel-cta:hover { background: var(--green-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(28,68,63,.35); }
    </style>
  </head>
  <body>

    <div class="fjb-header">
      <h1>Jobboard FiDurable</h1>
      <p>Offres finance durable sélectionnées et proposées par le réseau</p>
    </div>

    <!-- Skeleton loading -->
    <div id="fjb-skeleton">
      <div class="fjb-skeleton-grid">
        <div class="fjb-skeleton-card"><div class="fjb-shimmer"></div></div>
        <div class="fjb-skeleton-card"><div class="fjb-shimmer"></div></div>
        <div class="fjb-skeleton-card"><div class="fjb-shimmer"></div></div>
        <div class="fjb-skeleton-card"><div class="fjb-shimmer"></div></div>
        <div class="fjb-skeleton-card"><div class="fjb-shimmer"></div></div>
        <div class="fjb-skeleton-card"><div class="fjb-shimmer"></div></div>
      </div>
    </div>

    <!-- Toolbar sticky -->
    <div id="fjb-toolbar" style="display:none">
      <span id="fjb-count">0 offres</span>
      <input type="text" id="fjb-search" placeholder="🔍  Rechercher un poste ou une entreprise..." />
      <select class="fjb-filter" id="filter-secteur"><option value="">Tous les secteurs</option></select>
      <select class="fjb-filter" id="filter-contrat"><option value="">Tous les contrats</option></select>
      <select class="fjb-filter" id="filter-lieu"><option value="">Tous les lieux</option></select>
      <button id="fjb-reset">Réinitialiser</button>
    </div>

    <div id="fjb-grid"></div>

    <div id="fjb-backdrop"></div>
    <aside id="fjb-panel" role="dialog" aria-modal="true" aria-label="Détail de l'offre">
      <button id="fjb-panel-close" aria-label="Fermer">✕</button>
      <div id="fjb-panel-content"></div>
    </aside>

    <script>
      const API_URL = '/api/jobs';
      const skeleton  = document.getElementById('fjb-skeleton');
      const toolbar   = document.getElementById('fjb-toolbar');
      const countEl   = document.getElementById('fjb-count');
      const grid      = document.getElementById('fjb-grid');
      const panel     = document.getElementById('fjb-panel');
      const backdrop  = document.getElementById('fjb-backdrop');
      const closeBtn  = document.getElementById('fjb-panel-close');
      const content   = document.getElementById('fjb-panel-content');
      const searchEl  = document.getElementById('fjb-search');
      const selSecteur = document.getElementById('filter-secteur');
      const selContrat = document.getElementById('filter-contrat');
      const selLieu    = document.getElementById('filter-lieu');
      const resetBtn   = document.getElementById('fjb-reset');
      let allJobs = [];

      // ── Chargement ────────────────────────────────────────────────────
      async function loadJobs() {
        try {
          const res = await fetch(API_URL);
          if (!res.ok) throw new Error();
          allJobs = await res.json();
          buildFilters(allJobs);
          renderCards(allJobs);
          skeleton.style.display = 'none';
          toolbar.style.display = 'flex';
        } catch {
          skeleton.innerHTML = '<p style="text-align:center;color:var(--muted);padding:60px 0">Impossible de charger les offres.</p>';
        }
      }

      // ── Filtres ───────────────────────────────────────────────────────
      function buildFilters(jobs) {
        const unique = k => [...new Set(jobs.map(j => j[k]).filter(Boolean))];
        unique('secteur').forEach(v => selSecteur.innerHTML += `<option value="${esc(v)}">${esc(v)}</option>`);
        unique('contrat').forEach(v => selContrat.innerHTML += `<option value="${esc(v)}">${esc(v)}</option>`);
        unique('lieu').forEach(v => selLieu.innerHTML += `<option value="${esc(v)}">${esc(v)}</option>`);
      }

      function getFiltered() {
        const s = selSecteur.value, c = selContrat.value, l = selLieu.value;
        const q = searchEl.value.trim().toLowerCase();
        return allJobs.filter(j =>
          (!s || j.secteur === s) &&
          (!c || j.contrat === c) &&
          (!l || j.lieu    === l) &&
          (!q || j.titre.toLowerCase().includes(q) || j.entreprise.toLowerCase().includes(q))
        );
      }

      function applyFilters() {
        [selSecteur, selContrat, selLieu].forEach(el => el.classList.toggle('active', !!el.value));
        renderCards(getFiltered());
      }

      [selSecteur, selContrat, selLieu].forEach(el => el.addEventListener('change', applyFilters));
      searchEl.addEventListener('input', applyFilters);

      resetBtn.addEventListener('click', () => {
        selSecteur.value = ''; selContrat.value = ''; selLieu.value = '';
        searchEl.value = '';
        [selSecteur, selContrat, selLieu].forEach(el => el.classList.remove('active'));
        renderCards(allJobs);
      });

      // ── Badge "Nouveau" ───────────────────────────────────────────────
      function isNouveau(dateStr) {
        if (!dateStr) return false;
        const parts = dateStr.split('/');
        if (parts.length !== 3) return false;
        const d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
        const diff = (Date.now() - d.getTime()) / (1000 * 60 * 60 * 24);
        return diff >= 0 && diff <= 7;
      }

      // ── Rendu cards ───────────────────────────────────────────────────
      function renderCards(jobs) {
        grid.innerHTML = '';
        countEl.textContent = `${jobs.length} offre${jobs.length > 1 ? 's' : ''}`;

        if (!jobs.length) {
          grid.innerHTML = `<div class="fjb-empty">
            <p>Aucune offre pour ces critères.</p>
            <button onclick="document.getElementById('fjb-reset').click()">Réinitialiser les filtres</button>
          </div>`;
          return;
        }

        jobs.forEach((job, i) => {
          const card = document.createElement('div');
          card.className = 'fjb-card';
          card.tabIndex = 0;
          card.setAttribute('role', 'button');
          card.setAttribute('aria-label', `Voir l'offre : ${job.titre}`);

          const initiales = getInitiales(job.entreprise);
          const contratCls = getContratCls(job.contrat);
          const nouveau = isNouveau(job.date_debut);

          card.innerHTML = `
            <div class="fjb-card-top">
              <div class="fjb-avatar">${esc(initiales)}</div>
              <div class="fjb-card-info">
                <div class="fjb-card-titre">${esc(job.titre)}</div>
                  <div class="fjb-card-entreprise">${esc(job.entreprise)}</div>
                  ${job.date_creation ? `<div
                    style="font-size:.72rem;color:#9ca3af;margin-top:2px;">${timeAgo(job.date_creation)}</div>` : ''}
              </div>
              ${nouveau ? '<span class="fjb-badge-new">Nouveau</span>' : ''}
            </div>
            <div class="fjb-card-divider"></div>
            <div class="fjb-card-footer">
              <div class="fjb-card-meta">
                ${job.contrat ? `<span class="fjb-badge ${contratCls}" data-filter="contrat" data-value="${esc(job.contrat)}">${esc(job.contrat)}</span>` : ''}
                ${job.secteur ? `<span class="fjb-badge fjb-badge--secteur" data-filter="secteur" data-value="${esc(job.secteur)}">${esc(job.secteur)}</span>` : ''}
                ${job.lieu    ? `<span class="fjb-badge fjb-badge--lieu">📍 ${esc(job.lieu)}</span>` : ''}
              </div>
              ${job.date_debut ? `<div class="fjb-card-date">📅 Début : ${esc(job.date_debut)}</div>` : ''}
              <div class="fjb-card-cta"><span>Voir l'offre →</span></div>
            </div>`;

          // Clic sur la card
          card.addEventListener('click', e => {
            const badge = e.target.closest('.fjb-badge[data-filter]');
            if (badge) {
              e.stopPropagation();
              const filter = badge.dataset.filter;
              const value  = badge.dataset.value;
              if (filter === 'secteur') selSecteur.value = value;
              if (filter === 'contrat') selContrat.value = value;
              applyFilters();
              return;
            }
            openPanel(job);
          });

          card.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPanel(job); }
          });

          grid.appendChild(card);
          setTimeout(() => card.classList.add('visible'), 40 + i * 50);
        });
      }

      // ── Panel ─────────────────────────────────────────────────────────
      function openPanel(job) {
        const initiales = getInitiales(job.entreprise);
        const contratCls = getContratCls(job.contrat);
        let meta = '';
        if (job.date_debut) meta += metaRow('Date de début', esc(job.date_debut));
        if (job.niveau)     meta += metaRow('Niveau requis', esc(job.niveau));
        if (job.lieu)       meta += metaRow('Lieu', '📍 ' + esc(job.lieu));
        if (job.secteur2)   meta += metaRow('Secteur 2', esc(job.secteur2));

        content.innerHTML = `
          <div class="fjb-panel-header">
            <div class="fjb-panel-avatar">${esc(initiales)}</div>
            <div class="fjb-panel-titre">${esc(job.titre)}</div>
            <div class="fjb-panel-entreprise">${esc(job.entreprise)}</div>
          </div>
          <div class="fjb-panel-badges">
            ${job.contrat ? `<span class="fjb-badge ${contratCls}">${esc(job.contrat)}</span>` : ''}
            ${job.secteur ? `<span class="fjb-badge fjb-badge--secteur">${esc(job.secteur)}</span>` : ''}
            ${job.lieu    ? `<span class="fjb-badge fjb-badge--lieu">📍 ${esc(job.lieu)}</span>` : ''}
          </div>
          ${meta ? `<div class="fjb-panel-meta">${meta}</div>` : ''}
          ${job.description ? `<div class="fjb-panel-description"><h4>Description du poste</h4><p>${esc(job.description)}</p></div>` : ''}
          ${job.lien ? `<a href="${esc(job.lien)}" target="_blank" rel="noopener noreferrer" class="fjb-panel-cta">Postuler →</a>` : ''}`;

        panel.classList.add('is-open');
        backdrop.classList.add('is-open');
        document.body.style.overflow = 'hidden';
        closeBtn.focus();
      }

      function metaRow(label, value) {
        return `<div class="fjb-panel-meta-item"><span class="fjb-panel-meta-label">${label}</span><span>${value}</span></div>`;
      }

      function closePanel() {
        panel.classList.remove('is-open');
        backdrop.classList.remove('is-open');
        document.body.style.overflow = '';
      }

      closeBtn.addEventListener('click', closePanel);
      backdrop.addEventListener('click', closePanel);
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

      // ── Helpers ───────────────────────────────────────────────────────
      function getInitiales(nom) {
        if (!nom) return '?';
        const m = nom.trim().split(/\s+/);
        return m.length === 1 ? m[0].substring(0,2).toUpperCase() : (m[0][0]+m[1][0]).toUpperCase();
      }

      function getContratCls(contrat) {
        if (!contrat) return 'fjb-badge--autre';
        const c = contrat.toLowerCase();
        if (c.includes('stage'))                               return 'fjb-badge--stage';
        if (c.includes('cdi'))                                 return 'fjb-badge--cdi';
        if (c.includes('alternance') || c.includes('alter'))   return 'fjb-badge--alternance';
        if (c.includes('phd') || c.includes('doctorat'))       return 'fjb-badge--phd';
        return 'fjb-badge--autre';
      }
      
      function timeAgo(isoDate) {
        if (!isoDate) return '';
        const days = Math.round((Date.now() - new Date(isoDate)) / 86400000);
        if (days < 1) return 'ajouté aujourd\'hui';
        if (days === 1) return 'ajouté il y a 1 jour';
        if (days < 7) return `ajouté il y a ${days} jours`;
        const weeks = Math.round(days / 7);
        if (weeks === 1) return 'ajouté il y a 1 semaine';
        return `ajouté il y a ${weeks} semaines`;
      }
      
      function esc(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
      }

      loadJobs();
    </script>
  </body>
